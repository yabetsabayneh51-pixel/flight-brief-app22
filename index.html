
<!DOCTYPE html>
<html lang="en" class="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Crew Brief Pro</title>
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#0f172a">
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: { extend: { colors: { aviation: { dark: '#0f172a', panel: '#1e293b', accent: '#10b981' } } } }
    }
  </script>
  <link rel="stylesheet" href="styles.html">
</head>
<body class="bg-aviation-dark text-slate-300 font-sans h-screen flex overflow-hidden">

  <aside class="w-64 bg-aviation-panel flex flex-col hidden md:flex">
    <div class="p-6">
      <h1 class="text-2xl font-bold text-white tracking-widest flex items-center gap-2">
        <span class="w-3 h-3 bg-aviation-accent rounded-full animate-pulse"></span>
        CREW BRIEF
      </h1>
    </div>
    <nav class="flex-1 px-4 space-y-2">
      <button data-view="dashboard" class="nav-btn w-full text-left px-4 py-3 rounded-lg bg-slate-700 text-white font-medium">Dashboard</button>
      <button data-view="newBrief" class="nav-btn w-full text-left px-4 py-3 rounded-lg hover:bg-slate-700 font-medium">New Brief</button>
      <button data-view="cities" class="nav-btn w-full text-left px-4 py-3 rounded-lg hover:bg-slate-700 font-medium">City Database</button>
    </nav>
    <div class="p-4 border-t border-slate-700 text-sm flex justify-between items-center">
      <span id="network-status" class="flex items-center gap-2"><span class="w-2 h-2 rounded-full bg-green-500"></span> Online</span>
      <button id="sync-btn" class="text-xs bg-slate-700 px-2 py-1 rounded hover:bg-slate-600">Sync</button>
    </div>
  </aside>

  <main class="flex-1 flex flex-col h-full overflow-y-auto relative">
    <header class="md:hidden bg-aviation-panel p-4 flex justify-between items-center border-b border-slate-700 sticky top-0 z-10">
      <h1 class="font-bold text-white tracking-widest">CREW BRIEF PRO</h1>
      <button id="mobile-menu-btn" class="text-slate-300">Menu</button>
    </header>

    <div id="view-container" class="p-6 md:p-10 max-w-5xl mx-auto w-full pb-24">
      </div>
    
    <div id="sync-toast" class="fixed bottom-4 right-4 bg-emerald-600 text-white px-4 py-2 rounded shadow-lg transform translate-y-20 transition-transform duration-300 z-50">
      Syncing data...
    </div>
  </main>

  <script src="db.js"></script>
  <script src="sync.js"></script>
  <script src="app.js"></script>
</body>
</html>
